services:
  xibao-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xibao-discord-agent
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
      - discord_bot_venv:/opt/venv
      - ./logs:/app/logs
      - ./data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - AI_API_BASE=${AI_API_BASE}
      - TZ=${TZ}
      - PYTHONUNBUFFERED=1
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      xibao-api:
        condition: service_healthy
    command: ["sh", "-c", "ln -snf /usr/share/zoneinfo/$TZ /etc/localtime && echo $TZ > /etc/timezone && uv run python main_bot.py"]

  xibao-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xibao-device-api
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - .:/app
      - discord_bot_venv:/opt/venv
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "${DEVICE_API_PORT:-28766}:8766"
    environment:
      - DEVICE_API_PORT=8766
      - DEVICE_DB_PATH=${DEVICE_DB_PATH}
      - TZ=${TZ}
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8766/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    command: ["sh", "-c", "ln -snf /usr/share/zoneinfo/$TZ /etc/localtime && echo $TZ > /etc/timezone && uv run python main_api.py"]

volumes:
  discord_bot_venv:
